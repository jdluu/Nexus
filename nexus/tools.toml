# Nexus Configuration
# Define where your code projects live
project_root = "~/Projects"

[[tool]]
label = "Ping"
category = "UTIL"
description = "Ping google.com with custom flags"
command = "ping {flags} google.com"
requires_project = false
supports_flags = true

[[tool]]
label = "Echo Project"
category = "DEV"
description = "Echo the selected project path and flags"
command = "echo Project: {project} | Flags: {flags}"
requires_project = true
supports_flags = true

[[tool]]
label = "List Files"
category = "UTIL"
description = "List files in project directory"
command = "ls -la {flags}"
requires_project = true
supports_flags = true

[[tool]]
label = "System Monitor"
category = "UTIL"
description = "Launch top"
command = "top"
requires_project = false
supports_flags = false
